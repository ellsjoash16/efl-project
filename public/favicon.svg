<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: dark green pitch -->
  <rect width="32" height="32" rx="6" fill="#1a3a2a"/>

  <!-- Ball: white circle -->
  <circle cx="16" cy="16" r="9" fill="#f0f0f0" stroke="#222" stroke-width="0.5"/>

  <!-- Classic football pentagon patches -->
  <!-- Centre pentagon -->
  <polygon points="16,10.5 19.8,13.1 18.4,17.4 13.6,17.4 12.2,13.1" fill="#1a1a1a"/>
  <!-- Top patch -->
  <polygon points="16,8 17.6,9.2 16,10.5 14.4,9.2" fill="#1a1a1a"/>
  <!-- Top-right -->
  <polygon points="19.3,9.5 21.2,11.6 19.8,13.1 17.6,9.2" fill="#1a1a1a"/>
  <!-- Bottom-right -->
  <polygon points="21.2,11.6 22.4,14.5 20.4,17 18.4,17.4" fill="#1a1a1a" opacity="0.85"/>
  <!-- Bottom-left -->
  <polygon points="9.6,11.6 11.5,9.5 14.4,9.2 13.6,13.1" fill="#1a1a1a" opacity="0.85"/>
  <!-- Bottom -->
  <polygon points="13.6,17.4 18.4,17.4 17.2,19.8 14.8,19.8" fill="#1a1a1a" opacity="0.7"/>
</svg>
