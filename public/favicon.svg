  <!-- EFL lettering in gold -->
  <text x="16" y="21" text-anchor="middle"
        font-family="'Arial Black', Impact, sans-serif"
        font-weight="900" font-size="10" letter-spacing="0.5" fill="#c9a227">EFL</text>
</svg>
