<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0e2318"/>
  <!-- Gold outer shield -->
  <path d="M5,4 L27,4 L27,20 Q27,29 16,31.5 Q5,29 5,20 Z" fill="#c9a227"/>
  <!-- Dark inner shield (creates gold border effect) -->
