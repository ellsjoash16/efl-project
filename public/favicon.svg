<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="ball-clip">
      <circle cx="16" cy="16" r="9"/>
    </clipPath>
  </defs>

  <!-- Background: dark green rounded square -->
  <rect width="32" height="32" rx="6" fill="#1a3a2a"/>

  <!-- Ball -->
  <circle cx="16" cy="16" r="9" fill="white" stroke="#c8c8c8" stroke-width="0.4"/>

  <!-- All dark patches, clipped to ball circle -->
  <g clip-path="url(#ball-clip)" fill="#111111">

    <!-- Central pentagon (circumradius 3.5, pointing up) -->
    <polygon points="16,12.5 19.33,14.92 18.06,18.83 13.94,18.83 12.67,14.92"/>

    <!-- 5 arms: narrow triangles from each pentagon vertex outward (clipped at ball edge) -->
    <!-- Top (vertex P0 → upward) -->
    <polygon points="16,12.5 14.25,4 17.75,4"/>
    <!-- Upper-right (vertex P1) -->
    <polygon points="19.33,14.92 26.87,10.63 27.95,13.95"/>
    <!-- Lower-right (vertex P2) -->
    <polygon points="18.06,18.83 24.47,24.68 21.65,26.74"/>
    <!-- Lower-left (vertex P3) -->
    <polygon points="13.94,18.83 10.35,26.74 7.53,24.68"/>
    <!-- Upper-left (vertex P4) -->
    <polygon points="12.67,14.92 4.05,13.95 5.13,10.63"/>

    <!-- 5 outer patches near ball edge, sitting between the arms -->
    <!-- Upper-right gap (angle −54°) -->
    <polygon points="20.24,7.96 22.34,9.48 20.63,11.33 19.01,10.15"/>
    <!-- Right gap (angle 18°) -->
    <polygon points="24.96,17.54 24.16,20.02 21.87,18.96 22.49,17.06"/>
    <!-- Bottom gap (angle 90°) -->
    <polygon points="17.3,25 14.7,25 15,22.5 17,22.5"/>
    <!-- Left gap (angle 162°) -->
    <polygon points="7.84,20.02 7.04,17.54 9.51,17.06 10.13,18.96"/>
    <!-- Upper-left gap (angle 234°) -->
    <polygon points="9.66,9.48 11.76,7.96 12.99,10.15 11.37,11.33"/>

  </g>
</svg>
